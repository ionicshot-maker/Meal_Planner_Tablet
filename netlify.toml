[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Increase timeout for recipe import: page fetch (8s) + Gemini (20s) can exceed the 10s default
[functions."gemini-recipe-import"]
  timeout = 26

# Increase timeout for photo recipe import: Gemini vision calls can run long on larger images
[functions."gemini-photo-recipe"]
  timeout = 30

# Increase timeout for nutrition label scanning: same Gemini vision call profile
[functions."gemini-label-scan"]
  timeout = 30

# API proxy — must come before the SPA catch-all
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA routing: all paths serve index.html so React Router handles them
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache static assets aggressively (hashed filenames change on rebuild)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Don't cache the service worker or manifest
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"
